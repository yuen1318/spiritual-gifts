  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    /* ── Design Tokens ── */
    :root {
      --canvas:          #faf9f5;
      --surface-card:    #efe9de;
      --surface-soft:    #f5f0e8;
      --surface-dark:    #181715;
      --surface-dark-el: #252320;
      --primary:         #cc785c;
      --primary-active:  #a9583e;
      --accent-teal:     #5db8a6;
      --accent-amber:    #e8a55a;
      --ink:             #141413;
      --body:            #3d3d3a;
      --muted:           #6c6a64;
      --muted-soft:      #8e8b82;
      --hairline:        #e6dfd8;
      --on-primary:      #ffffff;
      --on-dark:         #faf9f5;
      --on-dark-soft:    #a09d96;

      /* Themed variables */
      --bg:              var(--canvas);
      --card-bg:         var(--surface-card);
      --card-border:     var(--hairline);
      --text-head:       var(--ink);
      --text-body:       var(--body);
      --text-muted:      var(--muted);
      --toggle-bg:       var(--surface-card);
      --toggle-knob:     var(--canvas);
      --nav-bg:          var(--canvas);
    }

    [data-theme="dark"] {
      --bg:              var(--surface-dark);
      --card-bg:         var(--surface-dark-el);
      --card-border:     #333230;
      --text-head:       var(--on-dark);
      --text-body:       var(--on-dark-soft);
      --text-muted:      #6c6a64;
      --toggle-bg:       #333230;
      --toggle-knob:     var(--primary);
      --nav-bg:          #141413;
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 18px;
      -webkit-text-size-adjust: 100%;
      height: 100%;
      overflow: hidden; /* prevent html-level scroll */
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-body);
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* ── Header / Nav ── */
    .nav {
      position: relative;
      top: 0;
      z-index: 100;
      background: var(--nav-bg);
      border-bottom: 1px solid var(--card-border);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-spike {
      color: var(--primary);
      font-size: 20px;
      line-height: 1;
      font-weight: 400;
    }

    .nav-title {
      font-family: 'Cormorant Garamond', 'Tiempos Headline', Georgia, serif;
      font-size: 19px;
      font-weight: 500;
      color: var(--text-head);
      letter-spacing: -0.2px;
    }

    /* ── Theme Toggle (Pill) ── */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      user-select: none;
    }

    .toggle-pill {
      position: relative;
      width: 52px;
      height: 28px;
      background: var(--toggle-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 9999px;
      cursor: pointer;
      transition: background 0.3s ease, border-color 0.3s ease;
      flex-shrink: 0;
    }

    .toggle-pill::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 9999px;
      background: var(--primary);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease;
      box-shadow: 0 1px 4px rgba(20,20,19,0.15);
    }

    [data-theme="dark"] .toggle-pill::after {
      transform: translateX(24px);
    }

    .toggle-icon {
      font-size: 16px;
      line-height: 1;
    }

    /* ── Carousel Stage ── */
    .carousel-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px 16px;
      min-height: 0; /* allow flex child to shrink */
    }

    .carousel-track {
      position: relative;
      width: min(340px, calc(100vw - 40px));
      height: 100%;
      max-height: 660px;
      cursor: grab;
      touch-action: none;
    }

    .carousel-track:active { cursor: grabbing; }

    /* ── Cards ── */
    .gift-card {
      position: absolute;
      inset: 0;
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 20px;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 0;
      user-select: none;
      backface-visibility: hidden;
      will-change: transform, opacity;
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.3s ease;
      overflow: hidden;
    }

    /* Stacked "ghost" cards behind active */
    .gift-card.behind-1 {
      transform: scale(0.94) translateY(12px);
      opacity: 0.6;
      pointer-events: none;
      z-index: 1;
    }

    .gift-card.behind-2 {
      transform: scale(0.88) translateY(22px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .gift-card.active {
      z-index: 10;
      box-shadow: 0 8px 32px rgba(20,20,19,0.12), 0 2px 8px rgba(20,20,19,0.06);
    }

    /* Suppress transitions during initial render / drag tracking */
    .gift-card.no-transition {
      transition: none !important;
    }

    /* Exit via CSS transitions (supports animating from an arbitrary drag position) */
    .gift-card.exiting-left {
      transform: translateX(-135%) rotate(-12deg) !important;
      opacity: 0 !important;
      transition: transform 0.4s cubic-bezier(0.55, 0, 1, 0.45),
                  opacity 0.35s ease !important;
      z-index: 20 !important;
    }

    .gift-card.exiting-right {
      transform: translateX(135%) rotate(12deg) !important;
      opacity: 0 !important;
      transition: transform 0.4s cubic-bezier(0.55, 0, 1, 0.45),
                  opacity 0.35s ease !important;
      z-index: 20 !important;
    }

    /* Card accent bar */
    .card-accent-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      border-radius: 20px 20px 0 0;
    }

    /* Card content */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
      margin-top: 8px;
    }

    .card-number {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-category-badge {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 9999px;
      padding: 3px 10px;
    }

    .card-icon {
      font-size: 34px;
      line-height: 1;
      margin-bottom: 8px;
      display: block;
    }

    .card-name {
      font-family: 'Cormorant Garamond', 'Tiempos Headline', Georgia, serif;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: -0.3px;
      line-height: 1.15;
      color: var(--text-head);
      margin-bottom: 10px;
    }

    .card-divider {
      width: 32px;
      height: 2px;
      border-radius: 2px;
      margin-bottom: 12px;
      background: var(--primary);
      opacity: 0.5;
    }

    .card-what {
      font-size: 15px;
      line-height: 1.55;
      color: var(--text-body);
      margin-bottom: 12px;
    }

    .card-section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .card-verse {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-style: italic;
      line-height: 1.5;
      color: var(--text-head);
      margin-bottom: 3px;
    }

    .card-verse-ref {
      font-size: 13px;
      font-weight: 500;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .card-today {
      font-size: 15px;
      line-height: 1.55;
      color: var(--text-body);
      flex: 1;
    }

    .card-footer {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-source {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .card-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-dot {
      width: 5px;
      height: 5px;
      border-radius: 9999px;
      background: var(--card-border);
      transition: background 0.25s, width 0.25s;
      flex-shrink: 0;
    }

    .card-dot.active {
      background: var(--primary);
      width: 16px;
    }

    /* ── Nav Arrows / Dots / Swipe hint — removed, no longer used ── */

    /* ── Intro Card Styles ── */
    .card-intro-inner {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding-top: 8px;
    }

    .card-intro-spike {
      font-size: 34px;
      color: var(--primary);
      margin-bottom: 20px;
      display: block;
    }

    .card-intro-eyebrow {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .card-intro-title {
      font-family: 'Cormorant Garamond', 'Tiempos Headline', Georgia, serif;
      font-size: clamp(34px, 8vw, 46px);
      font-weight: 400;
      letter-spacing: -0.5px;
      line-height: 1.1;
      color: var(--text-head);
    }

    .card-intro-verse {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-style: italic;
      line-height: 1.55;
      color: var(--text-head);
      margin-bottom: 8px;
    }

    .card-intro-ref {
      font-size: 14px;
      font-weight: 500;
      color: var(--primary);
      margin-bottom: 20px;
    }

    .card-intro-sub {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text-muted);
      flex: 1;
    }

    .card-intro-hint {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid var(--card-border);
      font-size: 15px;
      font-weight: 500;
      color: var(--primary);
      letter-spacing: 0.2px;
    }

    .card-intro-closing {
      background: rgba(204, 120, 92, 0.07);
      border-left: 3px solid var(--primary);
      border-radius: 0 8px 8px 0;
      padding: 12px 14px;
      margin: 4px 0 12px;
    }

    .card-intro-closing-spike {
      font-size: 16px;
      color: var(--primary);
      display: block;
      margin-bottom: 6px;
    }

    .card-intro-closing-verse {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-style: italic;
      line-height: 1.55;
      color: var(--text-head);
      margin-bottom: 4px;
    }

    .card-intro-closing-ref {
      font-size: 13px;
      font-weight: 500;
      color: var(--primary);
    }

    .dragging .gift-card.active {
      box-shadow: 0 16px 48px rgba(20,20,19,0.2), 0 4px 12px rgba(20,20,19,0.1);
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .gift-card, .toggle-pill::after { transition: none !important; }
    }

    /* ── Desktop adjustments ── */
    @media (min-width: 600px) {
      .carousel-track { width: 380px; }
      .card-name { font-size: 34px; }
      .card-intro-title { font-size: 46px; }
    }
  </style>
</head>

    /* ── Render card HTML ── */
    function dotsHTML(activeIdx) {
      return `<div class="card-dots">${gifts.map((_,i) =>
        `<div class="card-dot${i === activeIdx ? ' active' : ''}"></div>`
      ).join('')}</div>`;
    }

    function createCardEl(gift, activeIdx, className = '') {
      const card = document.createElement('div');
      card.className = 'gift-card ' + className;

      if (gift.type === 'intro') {
        card.innerHTML = `
          <div class="card-accent-bar" style="background:${gift.accent}"></div>
          <div class="card-intro-inner">
            <p class="card-intro-eyebrow">1 Corinthians 12 · Romans 12</p>
            <h2 class="card-intro-title">Gifts of the<br/>Holy Spirit</h2>
            <div class="card-divider" style="background:${gift.accent};margin:20px 0;width:48px;"></div>
            <p class="card-intro-verse">"There are different kinds of spiritual gifts but the same Spirit gives them."</p>
            <p class="card-intro-ref">— 1 Corinthians 12:4–7</p>
            <p class="card-intro-sub">These gifts are not for personal glory but for serving others.</p>
            <div class="card-intro-closing">
              <p class="card-intro-closing-verse">"But one and the same Spirit produces all of these, distributing them individually to each person as he wishes."</p>
              <p class="card-intro-closing-ref">— 1 Corinthians 12:11</p>
            </div>
            <div class="card-footer" style="margin-top:12px;">
              <span class="card-source">Gifts of the Holy Spirit</span>
              ${dotsHTML(activeIdx)}
            </div>
          </div>
        `;
        return card;
      }

      const categoryColor = gift.category === '1 Cor 12'
        ? 'color:#cc785c;background:rgba(204,120,92,0.1);'
        : 'color:#5db8a6;background:rgba(93,184,166,0.1);';

      card.innerHTML = `
        <div class="card-accent-bar" style="background:${gift.accent}"></div>
        <div class="card-header">
          <span class="card-number">Gift ${String(gift.number).padStart(2,'0')} <span style="color:var(--text-muted);font-weight:400">/ 15</span></span>
          <span class="card-category-badge" style="${categoryColor}">${gift.category}</span>
        </div>
        <span class="card-icon">${gift.icon}</span>
        <h2 class="card-name">${gift.name}</h2>
        <div class="card-divider" style="background:${gift.accent}"></div>
        ${gift.what ? `<p class="card-section-label">What is it?</p><p class="card-what">${gift.what}</p>` : ''}
        <p class="card-section-label">${gift.category === '1 Cor 12' ? 'NT Example' : 'Example'}</p>
        <p class="card-verse">${gift.verse}</p>
        <p class="card-verse-ref">— ${gift.verseRef}</p>
        <p class="card-section-label">Today</p>
        <p class="card-today">${gift.today}</p>
        <div class="card-footer">
          <span class="card-source">${gift.source}</span>
          ${dotsHTML(activeIdx)}
        </div>
      `;
      return card;
    }

    /* ── Render scene: active card + 2 ghost cards behind ── */
    function renderScene() {
      track.innerHTML = '';

      const ghost2Idx = (current + 2) % gifts.length;
      const g2 = createCardEl(gifts[ghost2Idx], current, 'behind-2');
      g2.classList.add('no-transition');
      track.appendChild(g2);

      const ghost1Idx = (current + 1) % gifts.length;
      const g1 = createCardEl(gifts[ghost1Idx], current, 'behind-1');
      g1.classList.add('no-transition');
      track.appendChild(g1);

      const ac = createCardEl(gifts[current], current, 'active');
      ac.classList.add('no-transition');
      track.appendChild(ac);
    }

    /* ── Navigate ── */
    function goTo(index, direction = null) {
      if (isAnimating || index === current) return;
      isAnimating = true;

      const dir = direction ?? (index > current ? 'left' : 'right');
      current = index;

      const activeCard  = track.querySelector('.gift-card.active');
      const behind1Card = track.querySelector('.gift-card.behind-1');
      const behind2Card = track.querySelector('.gift-card.behind-2');

      if (dir === 'left') {
        // NEXT: active flies left, behind stack rises forward
        // Insert new behind-2 card at the back of the DOM stack (lowest z-index)
        const newBehind2Idx = (current + 2) % gifts.length;
        const newBehind2 = createCardEl(gifts[newBehind2Idx], current, 'behind-2');
        newBehind2.classList.add('no-transition');
        newBehind2.style.transform = 'scale(0.82) translateY(34px)';
        newBehind2.style.opacity = '0';
        track.insertBefore(newBehind2, track.firstChild);

        // Enable transitions on existing cards
        [activeCard, behind1Card, behind2Card].forEach(c => c?.classList.remove('no-transition'));

        // Force reflow — establishes "from" state for all cards
        void track.getBoundingClientRect();

        // Trigger simultaneous transitions:
        if (activeCard)  activeCard.classList.add('exiting-left');

        if (behind1Card) {
          behind1Card.classList.replace('behind-1', 'active');
          behind1Card.style.transform = ''; // clear any drag offset
        }
        if (behind2Card) {
          behind2Card.classList.replace('behind-2', 'behind-1');
          behind2Card.style.transform = '';
        }

        // New behind-2 rises in from further back
        newBehind2.classList.remove('no-transition');
        newBehind2.style.transform = '';
        newBehind2.style.opacity = '';

      } else {
        // PREV: active exits right, new prev card slides in from the left.
        // Behind cards stay put — renderScene() rebuilds them after the transition.
        const newActiveCard = createCardEl(gifts[current], current, 'active');
        newActiveCard.classList.add('no-transition');
        newActiveCard.style.transform = 'translateX(-135%) rotate(-8deg)';
        newActiveCard.style.opacity = '0';
        // Append last so it sits on top when z-indices are equal
        track.appendChild(newActiveCard);

        // Enable transitions on existing cards
        [activeCard, behind1Card, behind2Card].forEach(c => c?.classList.remove('no-transition'));

        // Force reflow — establishes "from" state
        void track.getBoundingClientRect();

        // Old active exits right (continues naturally from any drag position)
        if (activeCard) activeCard.classList.add('exiting-right');

        // New prev card slides in from the left
        newActiveCard.classList.remove('no-transition');
        newActiveCard.style.transform = '';
        newActiveCard.style.opacity = '';

        // Behind-1 and behind-2 stay in place — they remain visible as the
        // silhouette throughout the transition and are rebuilt by renderScene().
      }

      setTimeout(() => {
        renderScene();
        isAnimating = false;
      }, 560);
    }

    function next() { goTo((current + 1) % gifts.length, 'left'); }
    function prev() { goTo((current - 1 + gifts.length) % gifts.length, 'right'); }

    /* ── Drag / Swipe ── */
    function onDragStart(x) {
      if (isAnimating) return;
      dragStartX = x;
      dragCurrentX = x;
      isDragging = true;
      track.classList.add('dragging');
      // Immediately lock out transitions so tracking is instant
      track.querySelectorAll('.gift-card').forEach(c => c.style.transition = 'none');
    }

    function onDragMove(x) {
      if (!isDragging) return;
      dragCurrentX = x;
      const dx = dragCurrentX - dragStartX;
      // Only peek the behind stack when dragging in the "next" direction (left)
      const peekProgress = dx < 0 ? Math.min(Math.abs(dx) / DRAG_THRESHOLD, 1) : 0;

      const activeCard  = track.querySelector('.gift-card.active');
      const behind1Card = track.querySelector('.gift-card.behind-1');
      const behind2Card = track.querySelector('.gift-card.behind-2');

      if (activeCard) {
        const rotate = (dx / window.innerWidth) * 18;
        activeCard.style.transform = `translateX(${dx}px) rotate(${rotate}deg)`;
      }

      // Behind cards subtly rise as the top card is dragged away
      if (behind1Card) {
        const scale = 0.94 + 0.06 * peekProgress;
        const ty    = 12  * (1 - peekProgress);
        behind1Card.style.transform = `scale(${scale.toFixed(4)}) translateY(${ty.toFixed(2)}px)`;
      }
      if (behind2Card) {
        const scale = 0.88 + 0.05 * peekProgress;
        const ty    = 22  * (1 - peekProgress * 0.6);
        behind2Card.style.transform = `scale(${scale.toFixed(4)}) translateY(${ty.toFixed(2)}px)`;
      }
    }

    function onDragEnd() {
      if (!isDragging) return;
      isDragging = false;
      track.classList.remove('dragging');

      const dx = dragCurrentX - dragStartX;
      const activeCard  = track.querySelector('.gift-card.active');
      const behind1Card = track.querySelector('.gift-card.behind-1');
      const behind2Card = track.querySelector('.gift-card.behind-2');

      if (Math.abs(dx) >= DRAG_THRESHOLD) {
        // Clear inline transition lock so goTo() can animate from the current drag position
        [activeCard, behind1Card, behind2Card].forEach(c => {
          if (c) c.style.transition = '';
        });
        if (dx < 0) next();
        else prev();
      } else {
        // Spring all cards back to their CSS-defined positions
        [activeCard, behind1Card, behind2Card].forEach(c => {
          if (!c) return;
          c.classList.remove('no-transition');
          c.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
          c.style.transform  = '';
        });
        setTimeout(() => {
          [activeCard, behind1Card, behind2Card].forEach(c => {
            if (c) c.style.transition = '';
          });
        }, 550);
      }
    }

    /* ── Pointer Events ── */
    track.addEventListener('pointerdown', e => {
      if (isAnimating) return;
      e.preventDefault();
      track.setPointerCapture(e.pointerId);
      onDragStart(e.clientX);
    });

    track.addEventListener('pointermove', e => {
      if (!isDragging) return;
      e.preventDefault();
      onDragMove(e.clientX);
    });

    track.addEventListener('pointerup', () => onDragEnd());
    track.addEventListener('pointercancel', () => onDragEnd());

    /* ── Keyboard navigation ── */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prev();
    });

    /* ── Theme Toggle ── */
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');

    function setTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('sg-theme', theme);
    }

    themeToggle.addEventListener('click', () => {
      setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    themeToggle.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        themeToggle.click();
      }
    });

    const saved = localStorage.getItem('sg-theme');
    if (saved) {
      setTheme(saved);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      setTheme('dark');
    }

    /* ── Init ── */
    renderScene();
  </script>
</body>
</html>
